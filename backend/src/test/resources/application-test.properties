# Test Profile Configuration
# This configuration is used when running tests with @ActiveProfiles("test")

# Use in-memory SQLite database for tests
spring.datasource.url=jdbc:sqlite::memory:
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate DDL auto - create-drop for tests (fresh schema each time)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable banner
spring.main.banner-mode=off

# Logging
logging.level.root=WARN
logging.level.com.hamradio.logbook=INFO
logging.level.org.springframework.boot.test=WARN
logging.level.org.springframework.test=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=WARN

# JWT Configuration for tests
jwt.secret=test-secret-key-for-testing-purposes-only-not-for-production-use-ever
jwt.expiration-ms=3600000

# Disable unnecessary features in tests
spring.devtools.restart.enabled=false
management.endpoints.enabled-by-default=false

# Transaction management
spring.jpa.properties.hibernate.connection.handling_mode=delayed_acquisition_and_release_after_transaction
