# Test Profile Configuration
# This configuration is used when running tests with @ActiveProfiles("test")

# Use H2 in-memory database for tests (full Hibernate 7.x compatibility)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate DDL auto - create-drop for tests (fresh schema each time)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable Open EntityManager in View - prevents EntityManager leakage in tests
spring.jpa.open-in-view=false

# Disable schema.sql/data.sql initialization (Hibernate DDL handles schema creation)
spring.sql.init.mode=never

# Disable banner
spring.main.banner-mode=off

# Logging
logging.level.root=WARN
logging.level.com.hamradio.logbook=INFO
logging.level.org.springframework.boot.test=WARN
logging.level.org.springframework.test=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=WARN

# JWT Configuration for tests
jwt.secret=test-secret-key-for-testing-purposes-only-not-for-production-use-ever
jwt.expiration-ms=3600000

# Disable unnecessary features in tests
spring.devtools.restart.enabled=false
management.endpoints.enabled-by-default=false
