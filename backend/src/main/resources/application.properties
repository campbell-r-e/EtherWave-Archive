# Server Configuration
server.port=8080
spring.application.name=ham-radio-logbook

# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:logbook.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# CORS Configuration (allow frontend access)
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# WebSocket Configuration
websocket.allowed-origins=http://localhost:4200

# Callsign Validation Cache (in seconds)
callsign.validation.cache.ttl=3600

# QRZ API Configuration (to be set via environment variables)
qrz.api.username=${QRZ_USERNAME:}
qrz.api.password=${QRZ_PASSWORD:}

# POTA API Configuration
pota.api.base-url=https://api.pota.app/v1

# JWT Configuration
# IMPORTANT: Set a strong secret key in production via environment variable
app.jwt.secret=${JWT_SECRET:ThisIsATemporarySecretKeyForDevelopmentOnlyPleaseChangeInProduction1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Admin User Configuration (from environment variables)
# Set these in your environment or docker-compose.yml
app.admin.username=${ADMIN_USERNAME:}
app.admin.password=${ADMIN_PASSWORD:}
app.admin.email=${ADMIN_EMAIL:admin@hamradio.local}
