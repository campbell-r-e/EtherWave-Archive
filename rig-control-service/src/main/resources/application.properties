# Rig Control Service Configuration
server.port=8081
spring.application.name=rig-control-service

# Hamlib rigctld Configuration
rigctld.host=${RIGCTLD_HOST:localhost}
rigctld.port=${RIGCTLD_PORT:4532}
rigctld.timeout=${RIGCTLD_TIMEOUT:1000}

# PTT Safety Timeout (seconds, 0 = disabled)
ptt.safety.timeout.seconds=${PTT_SAFETY_TIMEOUT_SECONDS:120}

# WebSocket API Key Authentication (comma-separated, empty = allow all)
rig.api.keys=${RIG_API_KEYS:}

# Cloud Relay Gateway
cloud.relay.gateway-url=${CLOUD_RELAY_GATEWAY_URL:}
cloud.relay.station-id=${CLOUD_RELAY_STATION_ID:0}
cloud.relay.api-key=${CLOUD_RELAY_API_KEY:}
cloud.relay.status-interval-ms=1000
cloud.relay.heartbeat-interval-ms=30000
cloud.relay.reconnect-delay-ms=5000

# Command audit log
rig.audit.max-entries=1000

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Logging
logging.level.com.hamradio.rigcontrol=${LOGGING_LEVEL_COM_HAMRADIO_RIGCONTROL:INFO}
logging.level.com.hamradio.rigcontrol.dispatcher=DEBUG
logging.level.com.hamradio.rigcontrol.polling=INFO
logging.level.com.hamradio.rigcontrol.relay=DEBUG
