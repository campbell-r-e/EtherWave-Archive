# Rig Control Service Configuration
server.port=8081
spring.application.name=rig-control-service

# Hamlib rigctld Configuration
rigctld.host=localhost
rigctld.port=4532

# Backend API Configuration
backend.api.url=http://localhost:8080
backend.api.enabled=true

# Station Configuration (set via environment or command line)
station.id=${STATION_ID:1}
station.name=${STATION_NAME:Station-1}

# Telemetry Polling Configuration
telemetry.polling.enabled=true
telemetry.polling.interval.ms=2000

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:4200,http://localhost:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Actuator Configuration (health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
