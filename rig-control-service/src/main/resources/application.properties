# Rig Control Service Configuration
server.port=8081
spring.application.name=rig-control-service

# Hamlib rigctld Configuration
rigctld.host=localhost
rigctld.port=4532
rigctld.timeout=1000

# WebSocket CORS (allows all origins - configure for production)
# Handled in WebSocketConfig.java

# Actuator Configuration (health checks only)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.hamradio.rigcontrol=INFO
logging.level.com.hamradio.rigcontrol.dispatcher=DEBUG
logging.level.com.hamradio.rigcontrol.polling=INFO
