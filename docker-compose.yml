services:
  # PostgreSQL Database
  postgres:
    image: postgres:18.3-alpine
    container_name: hamradio-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hamradio_logbook}
      POSTGRES_USER: ${POSTGRES_USER:-hamradio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      # Tune postgres for small-to-medium workloads
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hamradio} -d ${POSTGRES_DB:-hamradio_logbook}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - hamradio-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hamradio-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hamradio_logbook}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hamradio}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      # update: lets Hibernate evolve the schema without dropping data
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DDL_AUTO:-update}

      # Disable dev-only settings
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
      SPRING_JPA_OPEN_IN_VIEW: "false"

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

      # Admin user (auto-created on first startup if set)
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

      # QRZ API (optional)
      QRZ_USERNAME: ${QRZ_USERNAME:-}
      QRZ_PASSWORD: ${QRZ_PASSWORD:-}

      # Spring Boot actuator
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: never
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_data:/app/data
    networks:
      - hamradio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  # Frontend (Angular + Nginx)
  frontend:
    build:
      context: ./frontend/logbook-ui
      dockerfile: Dockerfile
    container_name: hamradio-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hamradio-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # Rig Control Service (optional - for testing)
  # Uncomment and configure for your rig
  # rig-control:
  #   build:
  #     context: ./rig-control-service
  #     dockerfile: Dockerfile
  #   container_name: hamradio-rig-control-1
  #   ports:
  #     - "8081:8081"
  #     - "4532:4532"
  #   environment:
  #     STATION_ID: 1
  #     STATION_NAME: "Station-1"
  #     RIGCTLD_HOST: localhost
  #     RIGCTLD_PORT: 4532
  #     BACKEND_API_URL: http://backend:8080
  #   # USB device passthrough (adjust for your radio)
  #   # Find device: ls -l /dev/tty* | grep USB
  #   devices:
  #     - "/dev/ttyUSB0:/dev/ttyUSB0"
  #   depends_on:
  #     - backend
  #   networks:
  #     - hamradio-network
  #   command: >
  #     sh -c "
  #       rigctld -m 1035 -r /dev/ttyUSB0 -s 38400 -t 4532 &
  #       java -jar app.jar
  #     "

networks:
  hamradio-network:
    driver: bridge

volumes:
  postgres_data:
  backend_data:
