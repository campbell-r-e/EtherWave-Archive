<div class="fullscreen-map-container">
  <!-- Header with Tabs, Controls, and Close Button -->
  <div class="map-header glass-panel">
    <div class="container-fluid">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <ul class="nav nav-tabs border-0 ew-tabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button
              class="nav-link"
              [class.active]="activeTab === 'interactive'"
              (click)="setActiveTab('interactive')"
              type="button"
              role="tab"
              aria-selected="activeTab === 'interactive'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/>
              </svg>
              Interactive Map
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button
              class="nav-link"
              [class.active]="activeTab === 'states'"
              (click)="setActiveTab('states')"
              type="button"
              role="tab"
              aria-selected="activeTab === 'states'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
              </svg>
              States/Provinces
            </button>
          </li>
        </ul>

        <div class="map-controls">
          <app-contest-overlay-controls
            (overlaysChanged)="onOverlaysChanged($event)">
          </app-contest-overlay-controls>

          <button
            class="btn ew-btn-danger close-button"
            (click)="onClose()"
            aria-label="Close map view">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            Close Map
          </button>
        </div>
      </div>

      <!-- Filter Panel -->
      <div class="filter-section">
        <app-map-filter-panel
          (filtersChanged)="onFiltersChanged($event)"
          (filtersCleared)="onFiltersCleared()">
        </app-map-filter-panel>
      </div>
    </div>
  </div>

  <!-- Map Content Area -->
  <div class="map-content">
    @if (activeTab === 'interactive') {
      <div class="map-tab-panel active">
        <app-qso-map></app-qso-map>
      </div>
    }

    @if (activeTab === 'states') {
      <div class="map-tab-panel active">
        <div class="states-map-wrapper">
          <app-map-visualization></app-map-visualization>
        </div>
      </div>
    }
  </div>
</div>
