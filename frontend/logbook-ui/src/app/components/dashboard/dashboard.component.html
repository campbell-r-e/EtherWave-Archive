<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark" role="navigation" aria-label="Main navigation">
  <div class="container-fluid">
    <a class="navbar-brand" href="#" aria-label="Ham Radio Logbook Home">📻 Ham Radio Logbook</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        @if (currentUser) {
          <li class="nav-item">
            <span class="navbar-text text-light me-3">
              Welcome, <strong>{{ currentUser.username }}</strong>
              @if (currentUser.callsign) {
                <span class="badge bg-primary ms-2">{{ currentUser.callsign }}</span>
              }
            </span>
          </li>
        }
        <li class="nav-item">
          <button class="btn btn-outline-light btn-sm" (click)="logout()" aria-label="Logout from your account">
            Logout
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Log Selector Bar -->
<app-log-selector></app-log-selector>

<!-- Main Dashboard Container -->
<div class="dashboard-container">
  <div class="container-fluid py-4">

    <!-- No Log Selected Warning -->
    @if (!currentLog) {
      <div class="row mb-4">
        <div class="col-12">
          <div class="alert alert-warning" role="alert" aria-live="polite">
            <h2 class="alert-heading h4">No Log Selected</h2>
            <p>Please select or create a logbook from the dropdown above to start logging QSOs.</p>
          </div>
        </div>
      </div>
    }

    <!-- Dashboard Content (Only show when log is selected) -->
    @if (currentLog) {
      <div>
        <!-- Row 1: QSO Entry and Rig Status -->
        <div class="row mb-4">
          <div class="col-lg-8">
            <app-qso-entry></app-qso-entry>
          </div>
          <div class="col-lg-4">
            <app-rig-status></app-rig-status>
          </div>
        </div>
        <!-- Row 2: Contest Selection and Station Management -->
        <div class="row mb-4">
          <div class="col-lg-6">
            <app-contest-selection></app-contest-selection>
          </div>
          <div class="col-lg-6">
            <app-station-management></app-station-management>
          </div>
        </div>
        <!-- Row 3: QSO List (Full Width) -->
        <div class="row mb-4">
          <div class="col-12">
            <app-qso-list></app-qso-list>
          </div>
        </div>
        <!-- Row 4: Map Visualization and Export -->
        <div class="row mb-4">
          <div class="col-lg-8">
            <app-map-visualization></app-map-visualization>
          </div>
          <div class="col-lg-4">
            <app-export-panel></app-export-panel>
          </div>
        </div>
      </div>
    }
    <!-- End Dashboard Content -->

  </div>
</div>
