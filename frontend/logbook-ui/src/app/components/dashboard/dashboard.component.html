<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #003F87;" role="navigation" aria-label="Main navigation">
  <div class="container-fluid">
    <!-- GEKHoosier Logo -->
    <a class="navbar-brand d-flex align-items-center" href="#" aria-label="GEKHoosier QSO Suite Home">
      <img [src]="themeService.isDarkTheme() ? 'assets/branding/logo-dark.svg' : 'assets/branding/logo.svg'"
           alt="GEKHoosier QSO Suite"
           height="45"
           class="d-inline-block align-text-top me-2">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        @if (currentUser) {
          <li class="nav-item">
            <span class="navbar-text text-light me-3">
              Welcome, <strong>{{ currentUser.username }}</strong>
              @if (currentUser.callsign) {
                <span class="badge bg-light text-dark ms-2">{{ currentUser.callsign }}</span>
              }
            </span>
          </li>
        }

        <!-- Theme Toggle Button -->
        <li class="nav-item me-2">
          <button class="btn btn-outline-light btn-sm"
                  (click)="themeService.toggleTheme()"
                  [attr.aria-label]="themeService.isDarkTheme() ? 'Switch to light mode' : 'Switch to dark mode'"
                  title="Toggle dark/light mode">
            @if (themeService.isDarkTheme()) {
              ☀️ Light
            } @else {
              🌙 Dark
            }
          </button>
        </li>

        <!-- Logout Button -->
        <li class="nav-item">
          <button class="btn btn-outline-light btn-sm" (click)="logout()" aria-label="Logout from your account">
            🚪 Logout
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Log Selector Bar -->
<app-log-selector></app-log-selector>

<!-- Main Dashboard Container -->
<div class="dashboard-container">
  <div class="container-fluid py-4">

    <!-- No Log Selected Warning -->
    @if (!currentLog) {
      <div class="row mb-4">
        <div class="col-12">
          <div class="alert alert-warning" role="alert" aria-live="polite">
            <h2 class="alert-heading h4">No Log Selected</h2>
            <p>Please select or create a logbook from the dropdown above to start logging QSOs.</p>
          </div>
        </div>
      </div>
    }

    <!-- Dashboard Content (Only show when log is selected) -->
    @if (currentLog) {
      <div>
        <!-- Row 1: Score Summary (Full Width) -->
        <div class="row mb-4">
          <div class="col-12">
            <app-score-summary></app-score-summary>
          </div>
        </div>
        <!-- Row 2: QSO Entry and Rig Status -->
        <div class="row mb-4">
          <div class="col-lg-8">
            <app-qso-entry></app-qso-entry>
          </div>
          <div class="col-lg-4">
            <app-rig-status></app-rig-status>
          </div>
        </div>
        <!-- Row 3: Contest Selection and Station Management -->
        <div class="row mb-4">
          <div class="col-lg-6">
            <app-contest-selection></app-contest-selection>
          </div>
          <div class="col-lg-6">
            <app-station-management></app-station-management>
          </div>
        </div>
        <!-- Row 4: QSO List (Full Width) -->
        <div class="row mb-4">
          <div class="col-12">
            <app-qso-list></app-qso-list>
          </div>
        </div>
        <!-- Row 5: Map Visualization and Export -->
        <div class="row mb-4">
          <div class="col-lg-8">
            <app-map-visualization></app-map-visualization>
          </div>
          <div class="col-lg-4">
            <app-export-panel></app-export-panel>
          </div>
        </div>
        <!-- Row 6: Import Panel -->
        <div class="row mb-4">
          <div class="col-12">
            <app-import-panel></app-import-panel>
          </div>
        </div>
      </div>
    }
    <!-- End Dashboard Content -->

  </div>
</div>
