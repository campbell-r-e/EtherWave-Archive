<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <!-- RF Waves (Cardinal Red) -->
  <path d="M 160 90 Q 140 70 120 90" fill="none" stroke="#C41E3A" stroke-width="8" stroke-linecap="round"/>
  <path d="M 170 75 Q 140 45 110 75" fill="none" stroke="#C41E3A" stroke-width="8" stroke-linecap="round"/>
  <path d="M 180 60 Q 140 20 100 60" fill="none" stroke="#C41E3A" stroke-width="8" stroke-linecap="round"/>

  <!-- Radio Tower (Hoosier Blue) -->
  <rect x="125" y="100" width="30" height="80" fill="#003F87"/>
  <polygon points="140,100 130,80 150,80" fill="#003F87"/>
  <rect x="120" y="130" width="40" height="3" fill="#003F87"/>
  <rect x="115" y="150" width="50" height="3" fill="#003F87"/>
  <rect x="110" y="170" width="60" height="3" fill="#003F87"/>
  <polygon points="140,180 110,200 170,200" fill="#003F87"/>

  <!-- Indiana State Outline (Cardinal Red) -->
  <path d="M 110 200 L 105 205 L 110 215 L 120 220 L 130 225 L 145 225 L 155 220 L 165 215 L 170 205 L 165 200 Z"
        fill="#C41E3A" opacity="0.9"/>

  <!-- GEK Text (Hoosier Blue) -->
  <text x="200" y="150" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="#003F87">GEK</text>

  <!-- Hoosier Text (Cardinal Red) -->
  <text x="390" y="150" font-family="Arial, sans-serif" font-size="80" font-weight="700" fill="#C41E3A">Hoosier</text>

  <!-- QSO SUITE Text (Hoosier Blue) -->
  <text x="340" y="200" font-family="Arial, sans-serif" font-size="40" font-weight="600" fill="#003F87" letter-spacing="8">QSO SUITE</text>
</svg>
