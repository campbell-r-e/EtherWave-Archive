<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Simplified icon version - globe with tower and waves -->

  <!-- Globe Circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#B8860B" stroke-width="4"/>

  <!-- Latitude Lines -->
  <ellipse cx="100" cy="100" rx="80" ry="25" fill="none" stroke="#B8860B" stroke-width="3"/>
  <line x1="100" y1="20" x2="100" y2="180" stroke="#B8860B" stroke-width="3"/>
  <line x1="20" y1="100" x2="180" y2="100" stroke="#B8860B" stroke-width="3"/>

  <!-- Longitude Lines -->
  <ellipse cx="100" cy="100" rx="25" ry="80" fill="none" stroke="#B8860B" stroke-width="3"/>

  <!-- Radio Tower -->
  <line x1="100" y1="55" x2="100" y2="100" stroke="#B8860B" stroke-width="5"/>
  <line x1="85" y1="65" x2="115" y2="65" stroke="#B8860B" stroke-width="3"/>
  <line x1="88" y1="75" x2="112" y2="75" stroke="#B8860B" stroke-width="3"/>
  <line x1="92" y1="85" x2="108" y2="85" stroke="#B8860B" stroke-width="3"/>

  <!-- RF Waves -->
  <path d="M 120 100 Q 140 80, 160 100" fill="none" stroke="#B8860B" stroke-width="4"/>
  <path d="M 125 100 Q 150 70, 175 100" fill="none" stroke="#B8860B" stroke-width="4"/>
  <path d="M 80 100 Q 60 80, 40 100" fill="none" stroke="#B8860B" stroke-width="4"/>
  <path d="M 75 100 Q 50 70, 25 100" fill="none" stroke="#B8860B" stroke-width="4"/>
</svg>
