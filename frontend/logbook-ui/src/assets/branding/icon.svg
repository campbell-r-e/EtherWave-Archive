<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Simplified icon version - just tower and waves -->

  <!-- RF Waves (Cardinal Red) -->
  <path d="M 120 60 Q 100 40 80 60" fill="none" stroke="#C41E3A" stroke-width="10" stroke-linecap="round"/>
  <path d="M 135 45 Q 100 10 65 45" fill="none" stroke="#C41E3A" stroke-width="10" stroke-linecap="round"/>
  <path d="M 150 30 Q 100 -20 50 30" fill="none" stroke="#C41E3A" stroke-width="10" stroke-linecap="round"/>

  <!-- Radio Tower (Hoosier Blue) -->
  <rect x="85" y="70" width="30" height="80" fill="#003F87"/>
  <polygon points="100,70 90,50 110,50" fill="#003F87"/>
  <rect x="80" y="95" width="40" height="4" fill="#003F87"/>
  <rect x="75" y="115" width="50" height="4" fill="#003F87"/>
  <rect x="70" y="135" width="60" height="4" fill="#003F87"/>
  <polygon points="100,150 70,170 130,170" fill="#003F87"/>

  <!-- Indiana State Outline (Cardinal Red) -->
  <path d="M 70 170 L 65 175 L 70 185 L 80 190 L 90 195 L 105 195 L 115 190 L 125 185 L 130 175 L 125 170 Z"
        fill="#C41E3A" opacity="0.9"/>
</svg>
