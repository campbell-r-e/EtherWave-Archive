<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <!-- Globe Circle -->
  <circle cx="125" cy="125" r="80" fill="none" stroke="#DAA520" stroke-width="3"/>

  <!-- Latitude Lines -->
  <ellipse cx="125" cy="125" rx="80" ry="25" fill="none" stroke="#DAA520" stroke-width="2"/>
  <line x1="125" y1="45" x2="125" y2="205" stroke="#DAA520" stroke-width="2"/>
  <line x1="45" y1="125" x2="205" y2="125" stroke="#DAA520" stroke-width="2"/>

  <!-- Longitude Lines -->
  <ellipse cx="125" cy="125" rx="25" ry="80" fill="none" stroke="#DAA520" stroke-width="2"/>

  <!-- Radio Tower -->
  <line x1="125" y1="80" x2="125" y2="125" stroke="#DAA520" stroke-width="4"/>
  <line x1="115" y1="90" x2="135" y2="90" stroke="#DAA520" stroke-width="2"/>
  <line x1="118" y1="100" x2="132" y2="100" stroke="#DAA520" stroke-width="2"/>
  <line x1="120" y1="110" x2="130" y2="110" stroke="#DAA520" stroke-width="2"/>

  <!-- RF Waves -->
  <path d="M 145 125 Q 160 110, 175 125" fill="none" stroke="#DAA520" stroke-width="3"/>
  <path d="M 150 125 Q 170 100, 190 125" fill="none" stroke="#DAA520" stroke-width="3"/>
  <path d="M 105 125 Q 90 110, 75 125" fill="none" stroke="#DAA520" stroke-width="3"/>
  <path d="M 100 125 Q 80 100, 60 125" fill="none" stroke="#DAA520" stroke-width="3"/>

  <!-- ETHERWAVE Text -->
  <text x="260" y="110" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#DAA520" letter-spacing="8">ETHERWAVE</text>

  <!-- ARCHIVE Text -->
  <text x="260" y="165" font-family="Arial, sans-serif" font-size="52" font-weight="300" fill="#DAA520" letter-spacing="16">ARCHIVE</text>
</svg>
