# Field Deployment Configuration
# Uses SQLite instead of PostgreSQL for portable operations
# Suitable for Field Day, POTA activations, portable contests

services:
  # Backend API with SQLite
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hamradio-backend-field
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      # SQLite configuration
      SPRING_DATASOURCE_URL: jdbc:sqlite:/app/data/logbook.db
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.sqlite.JDBC
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.community.dialect.SQLiteDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      # JWT (set a strong secret for field use)
      JWT_SECRET: ${JWT_SECRET:-FieldDeploymentSecretChangeThisBeforeUse1234567890AbCdEf}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

      # Admin user
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

      # QRZ API credentials (optional)
      QRZ_USERNAME: ${QRZ_USERNAME:-}
      QRZ_PASSWORD: ${QRZ_PASSWORD:-}
    volumes:
      # Persist SQLite database on host
      - ./data:/app/data
    networks:
      - hamradio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # Frontend (Angular + Nginx)
  frontend:
    build:
      context: ./frontend/logbook-ui
      dockerfile: Dockerfile
    container_name: hamradio-frontend-field
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hamradio-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  hamradio-network:
    driver: bridge
